site_name: ProtoPoke
site_description: A TCP proxy and protocol analysis tool — Burp Suite for arbitrary binary protocols
site_url: https://beaujeant.github.io/protopoke/
repo_url: https://github.com/beaujeant/protopoke
repo_name: beaujeant/protopoke

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.highlight
    - search.suggest
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Installation: installation.md
  - User Interface:
    - Getting Started: ui/getting-started.md
    - Config: ui/config.md
    - Traffic: ui/traffic.md
    - Intercept: ui/intercept.md
    - Forge: ui/forge.md
  - Core Library:
    - Getting Started: core/getting-started.md
    - Config: core/config.md
    - Traffic: core/traffic.md
    - Intercept: core/intercept.md
    - Forge: core/forge.md
  - Reference:
    - Framers: reference/framers.md
    - Protocol Definitions: reference/protocol-definitions.md
    - Custom Replace Scripts: reference/replace-scripts.md
    - Fuzzing (experimental): reference/fuzzing.md
  - Guides:
    - DNS: guides/dns.md
    - SSH-BPP: guides/ssh-bpp.md
  - MCP Server:
    - Overview: mcp/overview.md
    - Configuration: mcp/configuration.md
    - Tool Reference: mcp/tools.md
  - Development:
    - Architecture: development/architecture.md
    - Contributing: development/contributing.md
