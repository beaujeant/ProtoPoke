site_name: ProtoPoke
site_description: A TCP proxy and protocol analysis tool — Burp Suite for arbitrary binary protocols
site_url: https://beaujeant.github.io/protopoke/
repo_url: https://github.com/beaujeant/protopoke
repo_name: beaujeant/protopoke

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.highlight
    - search.suggest
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
  - User Guide:
    - Terminal UI: guide/tui.md
    - Framing: guide/framing.md
    - Protocol Definitions: guide/protocol-definitions.md
    - Tamper & Intercept: guide/tamper.md
    - Forge & Replay: guide/forge.md
    - Fuzzing: guide/fuzzing.md
    - TLS / MITM: guide/tls.md
    - Projects: guide/projects.md
  - MCP Server:
    - Overview: mcp/overview.md
    - Configuration: mcp/configuration.md
    - Tool Reference: mcp/tools.md
  - Python API:
    - Usage: api/usage.md
    - Examples: api/examples.md
  - Development:
    - Architecture: development/architecture.md
    - Contributing: development/contributing.md
