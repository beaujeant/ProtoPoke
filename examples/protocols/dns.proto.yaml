# DNS over UDP — protocol definition for ProtoPoke
#
# RFC 1035 §4.2.1: each DNS message travels in a single UDP datagram. There
# is no length prefix — the UDP framing is the message framing. In ProtoPoke,
# use a UDP forwarder with the default RawFramer; every datagram becomes one
# Frame and is fed directly to this parser starting at the 12-byte DNS
# header.
#
# Configure the forwarder in the TUI:
#
#   Config tab → Edit Forwarder → Type: UDP
#                                 Framer: raw  (default)
#                                 Protocol Definition: <path to this file>
#
# Python API:
#
#   ForwarderConfig(
#       name="DNS",
#       forwarder_type=ForwarderType.UDP,
#       listen_host="127.0.0.1", listen_port=5353,
#       upstream_host="1.1.1.1", upstream_port=53,
#       framer_name="raw",
#       protocol_definition_path="examples/protocols/dns.proto.yaml",
#   )
#
# DNS message layout (one full UDP datagram):
#
#   ┌──────────────────────────────────────────────────────────┐
#   │ Header (12 bytes, fixed)                                 │
#   │   ID        2B  – transaction identifier                 │
#   │   Flags     2B  – QR, OPCODE, AA, TC, RD, RA, Z, RCODE   │
#   │   QDCOUNT   2B  – number of questions                    │
#   │   ANCOUNT   2B  – number of answer RRs                   │
#   │   NSCOUNT   2B  – number of authority RRs                │
#   │   ARCOUNT   2B  – number of additional RRs               │
#   ├──────────────────────────────────────────────────────────┤
#   │ Question section  — QDCOUNT × (QNAME, QTYPE, QCLASS)     │
#   │ Answer section    — ANCOUNT × resource record            │
#   │ Authority section — NSCOUNT × resource record            │
#   │ Additional section— ARCOUNT × resource record            │
#   └──────────────────────────────────────────────────────────┘
#
# Visualisation notes (and DSL limitations):
#
#   QNAME (in the question section) is a sequence of length-prefixed labels
#   terminated by 0x00.  e.g. "www.example.com" →
#       03 'w' 'w' 'w' 07 'e' 'x' 'a' 'm' 'p' 'l' 'e' 03 'c' 'o' 'm' 00
#   We parse it as a NUL-terminated string with ASCII display, so the
#   domain reads as ".www.example.com" in the tree (the bytes 0x03/0x07
#   render as "." in ASCII mode).  Cross-reference the hex dump for the
#   exact bytes.  QNAME in the question section never uses compression.
#
#   Resource records (answers/authority/additional) start with a NAME which
#   in most replies is a 2-byte compression pointer (0xC0 0x0C → the name
#   from the question section).  We assume this for ANSWERS — true for the
#   overwhelming majority of replies from real-world resolvers (1.1.1.1,
#   8.8.8.8, BIND, Unbound, …).  If a response uses a full label sequence
#   instead of a pointer, the answer array will desynchronise and you'll
#   see garbled offsets after the first record — fall back to the hex
#   dump in that case.
#
#   RDATA is left as raw bytes regardless of TYPE, because its layout
#   depends on the record type:
#     A     (TYPE  1): 4 bytes  → IPv4 address (e.g. 08 08 08 08 = 8.8.8.8)
#     AAAA  (TYPE 28): 16 bytes → IPv6 address
#     CNAME (TYPE  5): label sequence (may be compressed)
#     MX    (TYPE 15): 2 bytes preference + label sequence
#     TXT   (TYPE 16): one or more length-prefixed strings
#   The DSL cannot switch field layout on a previously-parsed enum, so
#   inspect RDATA in the hex dump once you know the TYPE.
#
#   Authority + Additional sections are left as a single `extra_sections`
#   bytes blob.  The Additional section often contains an EDNS OPT record
#   whose NAME is a single 0x00 byte (the root), which would break the
#   2-byte compression-pointer assumption used for answers.
#
# Matching strategy:
#   Queries  — QR bit == 0 at flags byte 0, bit 7  → magic match on flags
#   Responses — QR bit == 1                         → magic match on flags
#
#   Because we cannot match on a single *bit*, we use broad magic-byte
#   rules over the typical flag-byte range:
#     QR=0 (query):    byte 2 in range 0x00–0x7F  → 0x00 or 0x01 (RD set)
#     QR=1 (response): byte 2 in range 0x80–0xFF  → 0x80 (RA=0) or 0x81 (RA=1)
#
#   Add more specific magic values (e.g., 0x04 for AA set, 0x84 for
#   authoritative responses) as you identify them in your traffic.

protocol:
  name: "DNS"
  version: "1.1 (RFC 1035, UDP)"
  endianness: big     # all DNS integers are big-endian

  messages:

    # ── Standard DNS query (QR=0, OPCODE=0, no flags set) ─────────────────
    - name: "Query"
      description: "Plain DNS query (QR=0). Flags byte 2 = 0x00 — no recursion, no truncation."
      direction: client_to_server
      match:
        type: magic
        offset: 2       # byte offset 2 = first byte of the Flags field
        value: "0x00"   # QR=0, OPCODE=0, AA=0, TC=0, RD=0
      fields:
        - name: id
          type: uint16
          display: hex
          # Transaction ID — ties queries to responses. Same value echoed
          # back in the matching response.

        - name: flags
          type: bitfield
          length: 2
          # The 16-bit Flags word, rendered as hex with its bits broken
          # out as children. Bit layout (LSB=bit 0):
          #   bit 15: QR      — 0=Query, 1=Response
          #   bit 14-11: OPCODE — 0=QUERY, 1=IQUERY, 2=STATUS
          #   bit 10: AA      — Authoritative Answer (response only)
          #   bit 9:  TC      — Truncated
          #   bit 8:  RD      — Recursion Desired
          #   bit 7:  RA      — Recursion Available (response only)
          #   bit 6:  Z       — Reserved, must be 0
          #   bit 5:  AD      — Authentic Data (DNSSEC, RFC 4035)
          #   bit 4:  CD      — Checking Disabled (DNSSEC, RFC 4035)
          #   bit 3-0: RCODE  — 0=NOERROR, 1=FORMERR, 2=SERVFAIL,
          #                     3=NXDOMAIN, 5=REFUSED
          bits: &flags_bits
            15: qr
            14: opcode_3
            13: opcode_2
            12: opcode_1
            11: opcode_0
            10: aa
            9:  tc
            8:  rd
            7:  ra
            6:  z
            5:  ad
            4:  cd
            3:  rcode_3
            2:  rcode_2
            1:  rcode_1
            0:  rcode_0

        - name: qdcount
          type: uint16
          # Number of entries in the Question section.

        - name: ancount
          type: uint16
          # Number of Resource Records in the Answer section.

        - name: nscount
          type: uint16
          # Number of Name Server Resource Records in the Authority section.

        - name: arcount
          type: uint16
          # Number of Resource Records in the Additional section.

        # The Question section is the most useful payload for a query:
        # one entry per question, each holding the domain name being asked
        # about (QNAME), the record type (QTYPE = A, AAAA, MX, …) and the
        # class (QCLASS, almost always IN). The array iterates QDCOUNT
        # times so it adapts to multi-question queries (rare but legal).
        - name: questions
          type: array
          array:
            count: "{qdcount}"
            item:
              - name: qname
                type: string
                null_terminated: true
                encoding: ascii
                display: ascii
                # Label-encoded domain name terminated by 0x00.
                # ASCII display renders the length-prefix bytes as "."
                # so the result reads close to the original FQDN.
              - name: qtype
                type: uint16
                display: enum
                enum: &qtype_enum
                  1:   "A (IPv4 address)"
                  2:   "NS (name server)"
                  5:   "CNAME (canonical name)"
                  6:   "SOA (zone authority)"
                  10:  "NULL"
                  12:  "PTR (reverse lookup)"
                  13:  "HINFO (host info)"
                  15:  "MX (mail exchange)"
                  16:  "TXT (text)"
                  17:  "RP (responsible person)"
                  18:  "AFSDB"
                  24:  "SIG"
                  25:  "KEY"
                  28:  "AAAA (IPv6 address)"
                  29:  "LOC"
                  33:  "SRV (service)"
                  35:  "NAPTR"
                  36:  "KX"
                  37:  "CERT"
                  39:  "DNAME"
                  41:  "OPT (EDNS pseudo-RR)"
                  43:  "DS"
                  44:  "SSHFP"
                  46:  "RRSIG"
                  47:  "NSEC"
                  48:  "DNSKEY"
                  50:  "NSEC3"
                  51:  "NSEC3PARAM"
                  52:  "TLSA"
                  53:  "SMIMEA"
                  59:  "CDS"
                  60:  "CDNSKEY"
                  61:  "OPENPGPKEY"
                  64:  "SVCB"
                  65:  "HTTPS"
                  99:  "SPF"
                  252: "AXFR (zone transfer)"
                  253: "MAILB"
                  254: "MAILA"
                  255: "ANY (*)"
                  257: "CAA"
              - name: qclass
                type: uint16
                display: enum
                enum: &qclass_enum
                  1:   "IN (Internet)"
                  2:   "CS (CSNET)"
                  3:   "CH (CHAOS)"
                  4:   "HS (Hesiod)"
                  254: "NONE"
                  255: "ANY"

        - name: extra_sections
          type: bytes
          length: -1
          display: hex
          # Anything after the questions — should be empty for a query
          # under normal conditions, but EDNS OPT pseudo-RRs sometimes
          # appear in the Additional section even on queries.

    # ── Recursive query (RD=1, the most common dig/resolver case) ─────────
    - name: "QueryRD"
      description: "DNS query with Recursion Desired set (flags byte 2 = 0x01). Almost every dig query."
      direction: client_to_server
      match:
        type: magic
        offset: 2
        value: "0x01"   # QR=0, OPCODE=0, RD=1
      fields:
        - { name: id,       type: uint16, display: hex }
        - name: flags
          type: bitfield
          length: 2
          bits: *flags_bits
        - { name: qdcount,  type: uint16 }
        - { name: ancount,  type: uint16 }
        - { name: nscount,  type: uint16 }
        - { name: arcount,  type: uint16 }
        - name: questions
          type: array
          array:
            count: "{qdcount}"
            item: &question_item
              - name: qname
                type: string
                null_terminated: true
                encoding: ascii
                display: ascii
              - name: qtype
                type: uint16
                display: enum
                enum: *qtype_enum
              - name: qclass
                type: uint16
                display: enum
                enum: *qclass_enum
        - { name: extra_sections, type: bytes, length: -1, display: hex }

    # ── NXDOMAIN response (RCODE=3) ───────────────────────────────────────
    - name: "NXDOMAIN"
      description: "DNS response: domain does not exist (flags byte 3 = 0x83, RA=1 + RCODE=3)."
      direction: server_to_client
      match:
        type: magic
        offset: 3         # second byte of the Flags field
        value: "0x83"
      fields:
        - { name: id,       type: uint16, display: hex }
        - name: flags
          type: bitfield
          length: 2
          bits: *flags_bits
          # Bits rcode_3..rcode_0 spell out RCODE = 3 (NXDOMAIN).
        - { name: qdcount,  type: uint16 }
        - { name: ancount,  type: uint16 }
        - { name: nscount,  type: uint16 }
        - { name: arcount,  type: uint16 }
        - name: questions
          type: array
          array:
            count: "{qdcount}"
            item: *question_item
        - { name: extra_sections, type: bytes, length: -1, display: hex }

    # ── Standard DNS response (QR=1, RA=0, RCODE=NOERROR) ─────────────────
    - name: "Response"
      description: "DNS response (QR=1). Flags byte 2 = 0x80 — RA=0, authoritative or non-recursive server."
      direction: server_to_client
      match:
        type: magic
        offset: 2
        value: "0x80"
      fields:
        - { name: id,       type: uint16, display: hex }
        - name: flags
          type: bitfield
          length: 2
          bits: *flags_bits
        - { name: qdcount,  type: uint16 }
        - { name: ancount,  type: uint16 }
        - { name: nscount,  type: uint16 }
        - { name: arcount,  type: uint16 }

        # The question is echoed back verbatim from the original query.
        - name: questions
          type: array
          array:
            count: "{qdcount}"
            item: *question_item

        # Each answer record. We assume the NAME is a 2-byte compression
        # pointer (0xC0 0x0C → the QNAME at offset 12) — true for almost
        # every reply from real resolvers. The RDATA's meaning depends on
        # rrtype:
        #   A     → 4 bytes IPv4   (e.g. 08 08 08 08 = 8.8.8.8)
        #   AAAA  → 16 bytes IPv6
        #   CNAME → label-encoded canonical name (often compressed)
        #   MX    → 2-byte preference + label-encoded mail-exchange name
        - name: answers
          type: array
          array:
            count: "{ancount}"
            item: &rr_item
              - name: name_ptr
                type: bytes
                length: 2
                display: hex
                # Compression pointer to the name (typically C0 0C).
              - name: rrtype
                type: uint16
                display: enum
                enum: *qtype_enum
              - name: rrclass
                type: uint16
                display: enum
                enum: *qclass_enum
              - name: ttl
                type: uint32
                display: decimal
              - name: rdlength
                type: uint16
                display: decimal
              - name: rdata
                type: bytes
                length: "{rdlength}"
                display: hex
                # Interpretation depends on rrtype — see comment above.

        - name: extra_sections
          type: bytes
          length: -1
          display: hex
          # Authority + Additional sections.  Left raw because the EDNS
          # OPT pseudo-RR commonly placed here uses a 1-byte NAME (root)
          # rather than a 2-byte compression pointer, which would break
          # the assumption used for the answers array above.

    # ── Recursive response (QR=1, RA=1, RCODE=NOERROR) ────────────────────
    - name: "ResponseRA"
      description: "DNS response with Recursion Available (flags byte 2 = 0x81). Most resolver responses, including 1.1.1.1 and 8.8.8.8."
      direction: server_to_client
      match:
        type: magic
        offset: 2
        value: "0x81"
      fields:
        - { name: id,       type: uint16, display: hex }
        - name: flags
          type: bitfield
          length: 2
          bits: *flags_bits
        - { name: qdcount,  type: uint16 }
        - { name: ancount,  type: uint16 }
        - { name: nscount,  type: uint16 }
        - { name: arcount,  type: uint16 }
        - name: questions
          type: array
          array:
            count: "{qdcount}"
            item: *question_item
        - name: answers
          type: array
          array:
            count: "{ancount}"
            item: *rr_item
        - { name: extra_sections, type: bytes, length: -1, display: hex }

    # ── Catch-all: anything not matched above ─────────────────────────────
    # Covers unusual opcodes, DNSSEC-specific flag combinations, etc.
    - name: "Unknown"
      description: "DNS message not matched by any specific rule — inspect the raw hex."
      match:
        type: always
      fields:
        - { name: id,       type: uint16, display: hex }
        - name: flags
          type: bitfield
          length: 2
          bits: *flags_bits
        - { name: qdcount,  type: uint16 }
        - { name: ancount,  type: uint16 }
        - { name: nscount,  type: uint16 }
        - { name: arcount,  type: uint16 }
        - name: questions
          type: array
          array:
            count: "{qdcount}"
            item: *question_item
        - { name: extra_sections, type: bytes, length: -1, display: hex }
